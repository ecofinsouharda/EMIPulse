<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EMIPulse</title>

<meta name="theme-color" content="#2563EB">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Splash -->

<section id="screenSplash" class="screen active">

<div class="splash">

<img
src="assets/Ecofin New Small trans.png"
class="logo">

<h1>EMIPulse</h1>

<p>EMI Collections Simplified</p>

<small>Fintech by Arambh</small>

</div>

</section>

<!-- Login -->

<section id="screenLogin" class="screen">

<div class="login-card">

<img
src="assets/Ecofin New Small trans.png"
class="login-logo">

<h2>ECOFIN CREDIT SOUHARDA CO-OP LTD.</h2>

<p>EMIPulse</p>

<input
id="collectorId"
placeholder="Collector ID">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">

LOGIN

</button>

<p id="loginMessage"></p>

</div>

</section>

<!-- Dashboard -->

<section id="screenDashboard" class="screen">

<header>

<img
src="assets/Ecofin New Small trans.png"
class="header-logo">

<div>

<h2>ECOFIN CREDIT SOUHARDA CO-OP LTD.</h2>

<p id="collectorName"></p>

</div>

</header>

<div class="dashboard-card">

<h3>Today's Collection</h3>

<h1 id="todayCollection">

₹0

</h1>

</div>

<div class="dashboard-grid">

<button id="btnMembers">

<span class="material-symbols-rounded">

groups

</span>

Members

</button>

<button id="btnCollection">

<span class="material-symbols-rounded">

payments

</span>

Collection

</button>

<button id="btnReports">

<span class="material-symbols-rounded">

bar_chart

</span>

Reports

</button>

<button id="btnLogout">

<span class="material-symbols-rounded">

logout

</span>

Logout

</button>

</div>

</section>

<!-- Members -->

<section id="screenMembers" class="screen">

<div class="page-title">

<button id="btnBack">

<span class="material-symbols-rounded">

arrow_back

</span>

</button>

<h2>Members</h2>

</div>

<div class="search">

<input

id="searchText"

placeholder="Search Member">

</div>

<div id="memberList"></div>

</section>

<!-- Collection -->

<section id="screenCollection" class="screen">

<div class="page-title">

<button id="btnBackDashboard">

<span class="material-symbols-rounded">

arrow_back

</span>

</button>

<h2>Collection</h2>

</div>

<div id="collectionBody">

</div>

</section>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/members.js"></script>
<script src="js/collection.js"></script>

</body>

</html>
