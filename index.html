<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563EB">
    <title>EMIPulse</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/Ecofin New Small trans.png">
    
    <!-- Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="screen active">
        <div class="splash-content">
            <img src="assets/Ecofin New Small trans.png" alt="EMIPulse Logo" class="logo">
            <h1>EMIPulse</h1>
            <p>EMI Collections Simplified</p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="login-container">
            <img src="assets/Ecofin New Small trans.png" alt="Logo" class="logo-small">
            <h2>Collector Login</h2>
            <form id="login-form">
                <div class="input-group">
                    <span class="material-icons">person</span>
                    <input type="text" id="collector-id" placeholder="Collector ID" required>
                </div>
                <div class="input-group">
                    <span class="material-icons">lock</span>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="main-app" class="hidden">
        <div id="dashboard-screen" class="screen"></div>
        <!-- Other screens will be added later -->
    </div>

    <div id="bottom-nav" class="bottom-nav hidden"></div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
